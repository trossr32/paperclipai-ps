name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run tests
        shell: pwsh
        run: |
          $result = Invoke-Pester ./Tests -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
